# pacman-aarch64.conf
# bootstrapping configuration

[options]
Architecture = aarch64
ParallelDownloads = 5
SigLevel = Never

[core]
Server = http://de4.mirror.archlinuxarm.org/$arch/$repo

[extra]
Server = http://de4.mirror.archlinuxarm.org/$arch/$repo

[alarm]
Server = http://de4.mirror.archlinuxarm.org/$arch/$repo
